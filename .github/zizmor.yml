rules:
  cache-poisoning:
    ignore:
      # TODO: Check if runtime artifacts potentially vulnerable to a cache poisoning attack.
      - pre-release.yaml:9:1

  unpinned-uses:
    # TODO: Pin SHA of all untrusted GitHub actions.
    ignore:
      - audit-dependencies.yaml
      - pre-commit.yaml
      - pre-release.yaml
      - test.yaml

  superfluous-actions:
    # TODO: Replace obsolete actions.
    ignore:
      - pre-commit.yaml:38:15
      - pre-release.yaml:74:15
      - pre-release.yaml:143:15
      - test.yaml:54:15
